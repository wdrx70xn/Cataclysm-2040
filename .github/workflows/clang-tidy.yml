name: Clang-tidy (clang-12, tiles)
'on':
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
concurrency:
  group: clang-tidy-build-${{ github.event.pull_request.number || github.ref_name
    }}
  cancel-in-progress: true
jobs:
  skip-duplicates:
    continue-on-error: true
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
    - id: skip_check
      uses: fkirc/skip-duplicate-actions@master
      with:
        cancel_others: 'true'
        paths: '[ "**.cpp", "**.h", "**.c", "**/CMakeLists.txt", "**/Makefile", "**.hpp",
          "**.cmake", ".github/workflows/clang-tidy.yml" ]'
  build:
    needs: skip-duplicates
    if: ${{ needs.skip-duplicates.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    env:
      CMAKE: 1
      CLANG: clang++-12
      COMPILER: clang++-12
      CATA_CLANG_TIDY: plugin
      TILES: 1
      SOUND: 1
    steps:
    - name: checkout repository
      uses: actions/checkout@v2
      with:
        fetch-depth: 1
    - name: install dependencies
      run: "wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add\
        \ -\nsudo apt-add-repository \"deb http://apt.llvm.org/focal/ llvm-toolchain-focal-12\
        \ main\"\nsudo apt-get update\nsudo apt-get install libncursesw5-dev clang-12\
        \ libclang-12-dev llvm-12-dev llvm-12-tools \\\n  libsdl2-dev libsdl2-ttf-dev\
        \ libsdl2-image-dev libsdl2-mixer-dev libpulse-dev ccache \\\n  gettext\n"
    - name: prepare
      run: bash ./build-scripts/requirements.sh
    - name: determine changed files
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/github-script@v5
      with:
        script: "var fs = require('fs');\nconst response = await github.paginate(github.rest.pulls.listFiles,\n\
          \  {\n    owner: context.repo.owner,\n    repo: context.repo.repo,\n   \
          \ pull_number: context.issue.number,\n  }\n);\nconst files = response.map(x\
          \ => x.filename);\nfor (const path of files) {\n  console.log(path);\n}\n\
          fs.writeFileSync(\"files_changed\", files.join('\\n'));\n"
    - uses: ammaraskar/gcc-problem-matcher@master
    - name: run clang-tidy
      run: bash ./build-scripts/clang-tidy.sh
